name: Publish Studio Image
on:
  workflow_dispatch: # Allows you to click a 'Play' button to start the build

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          # This saves the image to your private 'Packages' shelf
          tags: ghcr.io/${{ github.repository }}/forensic-studio:latest

