name: Audio Forensic Pipeline
on: [push]

permissions:
  contents: write

jobs:
  forensic-job:
    runs-on: ubuntu-latest # This is the 'Worker' GitHub provides
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Forensic Tools (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1
          pip install librosa numpy matplotlib

      - name: List Uploaded Files
        run: ls -R uploads/


      - name: Run Forensic Analysis
        run: python analyzer.py

      - name: Save Results to Repo
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          
          # Change this to match the actual files we see in your debug log
          if [ -f "analysis_map.png" ]; then
            git add analysis_map.png analysis_data.json
            git commit -m "Forensic Audit Complete [skip ci]"
            git push
          else
            echo "Physical results still missing."
            exit 1
          fi






